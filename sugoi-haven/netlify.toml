# Netlify reads this automatically — it overrides anything guessed in the UI,
# so the dashboard's "Build command" / "Publish directory" fields can be left
# blank or wrong and this file still wins.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# No SPA catch-all redirect on purpose: every real route is prerendered to a
# static file by scripts/prerender.mjs, so unknown URLs should get Netlify's
# native 404 handling (dist/404.html, real 404 status) — not the homepage
# with a 200, which Google treats as a soft-404.
